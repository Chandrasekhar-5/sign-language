<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Sign Language Translator</title>
    <script>
      // MediaPipe tries to polyfill fetch, which fails in some iframes where fetch is read-only.
      // We try to shadow it with a writable property on the window instance.
      (function() {
        try {
          const originalFetch = window.fetch;
          // Try to define it directly on the window object to shadow any prototype getters
          Object.defineProperty(window, 'fetch', {
            value: function() {
              return originalFetch.apply(window, arguments);
            },
            writable: true,
            configurable: true,
            enumerable: true
          });
          console.log("Successfully patched window.fetch");
        } catch (e) {
          console.error("Failed to patch fetch:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
