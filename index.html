    <title>AI Sign Language Translator</title>
    <script>
      /**
       * NUCLEAR FETCH PATCH
       * MediaPipe and other libraries often try to polyfill or wrap window.fetch.
       * In some restricted environments (like certain iframes), window.fetch is a 
       * read-only getter, and attempting to overwrite it throws a TypeError.
       */
      (function() {
        const target = window;
        const prop = 'fetch';
        const originalFetch = target[prop];

        // 1. Attempt to shadow the property on the instance to make it writable
        try {
          Object.defineProperty(target, prop, {
            value: function() {
              // CRITICAL: Always use 'target' (window) as the context for fetch
              return originalFetch.apply(target, arguments);
            },
            writable: true,
            configurable: true,
            enumerable: true
          });
          console.log("Successfully shadowed window.fetch");
        } catch (e) {
          console.warn("window.fetch is non-configurable. Attempting interception strategy.");
        }

        // 2. Intercept Object.defineProperty to prevent libraries from crashing when they try to 'fix' fetch
        const nativeDefineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, property, descriptor) {
          if (obj === target && property === prop) {
            console.log("Intercepted and suppressed attempt to redefine window.fetch");
            return obj;
          }
          try {
            // Ensure we don't lose context for native calls
            return nativeDefineProperty.call(Object, obj, property, descriptor);
          } catch (e) {
            return obj;
          }
        };

        // 3. Intercept Object.defineProperties as well
        const nativeDefineProperties = Object.defineProperties;
        Object.defineProperties = function(obj, properties) {
          if (obj === target && properties[prop]) {
            console.log("Intercepted and suppressed attempt to redefine window.fetch via defineProperties");
            const { [prop]: _, ...otherProps } = properties;
            return nativeDefineProperties(obj, otherProps);
          }
          return nativeDefineProperties(obj, properties);
        };

        // 4. Handle globalThis if it exists
        if (typeof globalThis !== 'undefined' && globalThis !== window) {
          try {
            const gtFetch = globalThis.fetch;
            Object.defineProperty(globalThis, 'fetch', {
              value: function() { return gtFetch.apply(this, arguments); },
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {}
        }
      })();
    </script>
